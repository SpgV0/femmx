# Modified by Claude (Anthropic), noreply@anthropic.com, 2026-07-09:
# renamed workflow/artifact names from FEMM to FEMMX (project rebrand:
# femm_plus -> femmx). The femm.exe -> femmx.exe rename itself is in
# femm/CMakeLists.txt; the "Register femm.ActiveFEMM COM class" step
# name is unchanged since that ProgID string is unchanged.
# Modified by Claude (Anthropic), noreply@anthropic.com, 2026-07-09:
# moved "Install NSIS" before "Build FEMM" and removed the separate
# "Build Installer" step -- the root CMakeLists.txt now builds the
# installer automatically as part of build.ps1's own install step
# whenever makensis is found, so a manual second invocation here would
# just duplicate that (see CMakeLists.txt). Updated the final artifact
# path to bin/FEMMX_installer.exe, its new location (see script.nsi).
# Modified by Claude (Anthropic), noreply@anthropic.com, 2026-07-17:
# the installer filename is now versioned (bin/FEMMX_v<version>_
# installer.exe, see script.nsi's PROJECT_VERSION) -- switched the
# artifact upload paths to a glob so this doesn't go stale each release.
# Modified by Claude (Anthropic), noreply@anthropic.com, 2026-07-09:
# added the win-cuda job, a CUDA-enabled build (fkn.exe built with
# -DENABLE_CUDA_SOLVER=ON, see fkn/CMakeLists.txt) run alongside the
# existing CPU-only win-vcpkg job. Needed build.ps1's own
# -AdditionalBuildSetup passthrough bug fixed first (see build.ps1) --
# that parameter was declared but silently never used.
#
# windows-latest runners have no NVIDIA GPU, so this job can only verify
# the CUDA build actually compiles/links/runs, not that it's actually
# faster: it deselects gpu_solver_test.py::test_gpu_is_faster_when_available
# and ac_gpu_solver_test.py's equivalent (both would otherwise fail here,
# since GPUAccel silently falls back to the CPU solve when no CUDA-capable
# GPU is found at run time -- see fkn/spars.cpp -- so "GPU" and CPU timings
# come out equal). The correctness tests in those same files are still
# run and are meaningful even without a GPU present (see their docstrings).
#
# Pinned to CUDA 12.6 rather than the action's newer default: CUDA 13.x
# dropped support for compute capability sm_60, one of the four
# architectures fkn/CMakeLists.txt's FEMM_CUDA_ARCHS builds for by
# default, which would otherwise break this build.
#
# Modified by Claude (Anthropic), noreply@anthropic.com, 2026-07-09:
# pinned this job's runner to windows-2022 instead of windows-latest.
# windows-latest turned out to have Visual Studio 18 (2026) installed --
# far newer than CUDA 12.6's officially supported MSVC window (2017-2022)
# -- and this wasn't just the soft version-string gate that
# -allow-unsupported-compiler (fkn/CMakeLists.txt) skips: nvcc's own
# cudafe++ preprocessor crashed outright (ACCESS_VIOLATION) trying to
# parse that MSVC's headers, a genuine binary incompatibility no flag
# fixes. windows-2022 ships VS2022, squarely inside CUDA 12.6's tested
# range, which sidesteps the whole problem instead of chasing forward
# compatibility with whatever MSVC a "latest" runner happens to have.
#
# `continue-on-error: true` still on for now since this exact
# runner+CUDA combination hasn't gone green in a live run yet.
#
# Modified by Claude (Anthropic), noreply@anthropic.com, 2026-07-17:
# added manual-PDF build/versioning/upload steps to win-vcpkg, run via
# manual/build_manual.bat as a step of their own -- deliberately NOT by
# dropping -DisableLaTeX from the "Build FEMM" step above and letting
# CMake's own LaTeXDocument target pull the manual into that same build.
# Verified locally this session: when the LaTeX/dvips/ps2pdf toolchain
# hiccups, CMake's custom-build-rule failure propagates straight through
# `cmake --build --target install` as a hard failure -- build.ps1 throws
# (MyThrow) and the entire job (installer included) would go down with
# it. A separately-invoked build_manual.bat, marked
# `continue-on-error: true` and gated on manual.pdf actually existing
# afterward, means a flaky first-run MiKTeX package fetch (network-
# dependent, the likeliest real-world failure mode in a fresh CI runner)
# can only ever cost this one optional artifact, never the build/tests/
# installer that the rest of this job produces.
name: FEMMX Continuous Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  win-vcpkg:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: lukka/get-cmake@latest

    - name: 'Install NSIS'
      shell: pwsh
      run: choco install nsis -y --no-progress

    - name: 'Build FEMM'
      shell: pwsh
      run: ${{ github.workspace }}/build.ps1 -DoNotUpdateTOOL -DisableInteractive -DisableLaTeX -ForceTriangle32bit

    - name: 'Install LaTeX (MiKTeX) + Ghostscript for the manual PDF'
      shell: pwsh
      continue-on-error: true
      run: |
        choco install miktex ghostscript -y --no-progress

        # choco install only updates the machine/user PATH in the registry --
        # it does NOT propagate into this already-running process, and each
        # workflow `run:` step is a fresh process anyway, so a plain
        # `refreshenv` here wouldn't carry over to the next step either.
        # Persist the newly installed tools' bin directories via
        # $GITHUB_PATH (the mechanism GitHub Actions actually reads to
        # extend PATH for every subsequent step in this job) so "Build
        # manual PDF" below can find latex/dvips/ps2pdf.
        # PowerShell's Get-ChildItem -Path doesn't support a bash-style "**"
        # recursive glob -- use -Recurse on each install root instead and
        # look for the specific executables build_manual.bat needs.
        $searchRoots = @(
          "$env:ProgramFiles\MiKTeX",
          "$env:ProgramData\chocolatey\lib\miktex",
          "$env:ProgramFiles\gs",
          "$env:ProgramData\chocolatey\lib\ghostscript*"
        )
        $wantedExes = @("latex.exe", "dvips.exe", "gswin64c.exe", "gswin32c.exe", "ps2pdf.exe")
        $foundDirs = New-Object System.Collections.Generic.HashSet[string]
        foreach ($root in $searchRoots) {
          foreach ($resolvedRoot in (Resolve-Path -Path $root -ErrorAction SilentlyContinue)) {
            Get-ChildItem -Path $resolvedRoot -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $wantedExes -contains $_.Name } |
              ForEach-Object { [void]$foundDirs.Add($_.DirectoryName) }
          }
        }
        if ($foundDirs.Count -eq 0) {
          Write-Host "Could not locate latex/dvips/ps2pdf bin directories after install -- the manual build step will likely fail (it's best-effort, see continue-on-error above)."
        }
        foreach ($dir in $foundDirs) {
          Write-Host "Adding to PATH for subsequent steps: $dir"
          Add-Content -Path $env:GITHUB_PATH -Value $dir
        }

    - name: 'Build manual PDF'
      shell: pwsh
      continue-on-error: true
      run: |
        & "${{ github.workspace }}/manual/build_manual.bat"

    - name: 'Version the manual PDF (FEMMX_v<version>_manual.pdf)'
      shell: pwsh
      continue-on-error: true
      run: |
        $manualPdf = "${{ github.workspace }}/manual/manual.pdf"
        if (Test-Path $manualPdf) {
          $nsi = Get-Content "${{ github.workspace }}/script.nsi" -Raw
          $version = [regex]::Match($nsi, 'PROJECT_VERSION "([^"]+)"').Groups[1].Value
          if (-not $version) { $version = "unknown" }
          Copy-Item $manualPdf "${{ github.workspace }}/manual/FEMMX_v${version}_manual.pdf"
        } else {
          Write-Host "manual.pdf was not produced (LaTeX toolchain issue) -- skipping, this artifact is best-effort."
        }

    - uses: actions/upload-artifact@v4
      with:
        name: FEMMX-manual
        path: ${{ github.workspace }}/manual/FEMMX_v*_manual.pdf
        if-no-files-found: warn

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 'Install Python test dependencies'
      shell: pwsh
      run: python -m pip install -r ${{ github.workspace }}/test/requirements.txt

    - name: 'Register femm.ActiveFEMM COM class'
      shell: pwsh
      run: ${{ github.workspace }}/scripts/register_femm_com.ps1

    - name: 'Run regression tests'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ${{ github.workspace }}/test/results | Out-Null
        python -m pytest ${{ github.workspace }}/test --junitxml=${{ github.workspace }}/test/results/junit.xml -v

    - name: 'Restore femm.ActiveFEMM COM registration'
      if: always()
      shell: pwsh
      run: ${{ github.workspace }}/scripts/unregister_femm_com.ps1

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ${{ github.workspace }}/test/results

    - uses: actions/upload-artifact@v4
      with:
        name: FEMMX-windows
        path: ${{ github.workspace }}/bin/FEMMX_v*_installer.exe

  win-cuda:
    runs-on: windows-2022
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - uses: lukka/get-cmake@latest

    - name: 'Install NSIS'
      shell: pwsh
      run: choco install nsis -y --no-progress

    - name: 'Install CUDA Toolkit'
      id: cuda-toolkit
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: '12.6.0'
        method: 'network'

    - name: 'Build FEMM with -DENABLE_CUDA_SOLVER=ON'
      shell: pwsh
      run: |
        $extra = "-DENABLE_CUDA_SOLVER=ON `"-DFEMM_CUDA_ROOT=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}`""
        ${{ github.workspace }}/build.ps1 -DoNotUpdateTOOL -DisableInteractive -DisableLaTeX -ForceTriangle32bit -AdditionalBuildSetup $extra

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 'Install Python test dependencies'
      shell: pwsh
      run: python -m pip install -r ${{ github.workspace }}/test/requirements.txt

    - name: 'Register femm.ActiveFEMM COM class'
      shell: pwsh
      run: ${{ github.workspace }}/scripts/register_femm_com.ps1

    - name: 'Run GPU-build correctness tests (this runner has no GPU, so speedup-only assertions are deselected -- see the comment at the top of this file)'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ${{ github.workspace }}/test/results | Out-Null
        python -m pytest ${{ github.workspace }}/test/gpu_solver_test.py ${{ github.workspace }}/test/ac_gpu_solver_test.py -k "not is_faster_when_available" --junitxml=${{ github.workspace }}/test/results/junit-cuda.xml -v

    - name: 'Restore femm.ActiveFEMM COM registration'
      if: always()
      shell: pwsh
      run: ${{ github.workspace }}/scripts/unregister_femm_com.ps1

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-cuda
        path: ${{ github.workspace }}/test/results

    - uses: actions/upload-artifact@v4
      with:
        name: FEMMX-windows-cuda
        path: ${{ github.workspace }}/bin/FEMMX_v*_installer.exe
